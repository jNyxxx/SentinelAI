# ========================================================================
# SERVER CONFIGURATION
# ========================================================================
server.port=8082

# ========================================================================
# FILE UPLOAD CONFIGURATION
# ========================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ========================================================================
# POSTGRESQL DATABASE CONFIGURATION
# ========================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sentineldb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:nyxx}

# ========================================================================
# JPA/HIBERNATE CONFIGURATION
# ========================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ========================================================================
# FILE STORAGE CONFIGURATION
# ========================================================================
file.storage.location=./incidents-reports
file.storage.enabled=true

# ========================================================================
# JWT CONFIGURATION
# ========================================================================
jwt.secret=${JWT_SECRET:SentinelAISecretKeyForJWTTokenGenerationAndValidation2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================================================================
# LM STUDIO CONFIGURATION
# ========================================================================
lmstudio.api.url=${LMSTUDIO_URL:http://localhost:1234/v1/chat/completions}
lmstudio.model.name=${LMSTUDIO_MODEL:qwen/qwen3-vl-4b}
lmstudio.temperature=0.2
lmstudio.prompt=You are a professional AI surveillance analyst specializing in threat detection. Analyze this surveillance image carefully and generate a COMPREHENSIVE incident report.\n\n=== CRITICAL DETECTION RULES ===\n\n**WEAPONS (ALWAYS FLAG AS HIGH RISK)**:\n- Knives, blades, sharp objects held aggressively\n- Firearms, guns, pistols, rifles\n- Blunt objects used as weapons (bats, clubs, pipes)\n- Any object that could be used as a weapon in a threatening manner\n\n**MASKED/OBSCURED IDENTITY (FLAG AS MEDIUM/HIGH RISK)**:\n- Person wearing mask, balaclava, face covering\n- Face obscured by cloth, hood, or other material\n- Person hiding their identity in a suspicious context\n\n**HIGH RISK INDICATORS**:\n- Weapons visible (knives, guns, blunt objects)\n- Masked individuals with weapons or in suspicious poses\n- Aggressive stances, threatening gestures\n- Violence, assault, physical confrontation\n- Forced entry, breaking, vandalism\n- Fire, smoke, explosions\n- Active theft or criminal activity\n- Multiple suspicious indicators combined\n\n**MEDIUM RISK INDICATORS**:\n- Masked individual without visible weapon\n- Loitering in restricted areas\n- Person in area where they may not belong\n- Unattended suspicious objects\n- Behavior warrants monitoring\n\n**LOW RISK (NORMAL ACTIVITY)**:\n- People in routine, everyday activities\n- No weapons, no masks, no aggression\n- Calm, peaceful environment\n- Clearly benign context\n\n=== OUTPUT FORMAT (REQUIRED - EXACT FORMAT) ===\n\nClassification: [Suspicious Activity OR Normal Activity]\nRisk Level: [High OR Medium OR Low]\n\nSummary:\n[2-3 sentences describing the scene]\n\nDetailed Analysis:\n- People: [Describe count, appearance, actions, weapons, masks]\n- Environment: [Describe setting]\n- Objects: [Describe weapons, suspicious items]\n- Suspicious Indicators: [List all suspicious elements or state "None"]\n\nRisk Assessment:\n[Explain WHY this risk level was assigned]\n\nConclusion:\n[Overall assessment]\n\nRecommendation:\n[Specific action based on risk level]

# ========================================================================
# MVC CONFIGURATION
# ========================================================================
spring.mvc.pathmatch.use-suffix-pattern=false
spring.web.mvc.problematic-path-patterns=false

# ========================================================================
# REDIS CONFIGURATION
# ========================================================================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000
#frames expires  after 30 minutes in cache
redis.frames.expiry=1800

# ========================================================================
# FFMPEG CONFIGURATION
# ========================================================================
ffmpeg.path=C:/ffmpeg/bin/ffmpeg.exe
ffprobe.path=C:/ffmpeg/bin/ffprobe.exe